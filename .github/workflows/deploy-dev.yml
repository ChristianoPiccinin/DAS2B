name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'azfun-das2b-chris-dev'
  PYTHON_VERSION: '3.13'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-prod-${{ hashFiles('src/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-prod-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_DEV }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./src
          remote-build: true

      - name: Wait for Function App startup
        run: sleep 15

      - name: Run health checks
        run: |
          python -c "
          import requests
          import time

          app_url = 'https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net'
          max_retries = 3
          retry_delay = 5

          for attempt in range(max_retries):
              try:
                  response = requests.get(app_url, timeout=10)
                  print(f'Health check passed: {response.status_code}')
                  break
              except Exception as e:
                  print(f'Health check attempt {attempt + 1}/{max_retries} failed: {e}')
                  if attempt < max_retries - 1:
                      time.sleep(retry_delay)
                  else:
                      raise
          "

      - name: Deployment complete
        run: |
          echo "Dev deployment complete for commit ${{ github.sha }}"
          echo "Timestamp: $(date)"
