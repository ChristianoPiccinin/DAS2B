name: Deploy to Staging/Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  release:
    types: [published]

env:
  PYTHON_VERSION: '3.13'

jobs:
  deploy-staging:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-prod-${{ hashFiles('src/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-prod-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_STAGING }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_STAGING }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_STAGING }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: azfun-das2b-chris-staging
          package: ./src
          remote-build: true

      - name: Wait for Function App startup
        run: sleep 15

      - name: Run health checks
        run: |
          python -c "
          import requests
          import time

          app_url = 'https://azfun-das2b-chris-staging.azurewebsites.net'
          max_retries = 3
          retry_delay = 5

          for attempt in range(max_retries):
              try:
                  response = requests.get(app_url, timeout=10)
                  print(f'Health check passed: {response.status_code}')
                  break
              except Exception as e:
                  print(f'Health check attempt {attempt + 1}/{max_retries} failed: {e}')
                  if attempt < max_retries - 1:
                      time.sleep(retry_delay)
                  else:
                      raise
          "

      - name: Log deployment details
        run: |
          echo "Staging deployment complete"
          echo "Timestamp: $(date)"
          echo "Commit: ${{ github.sha }}"

  deploy-production:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-prod-${{ hashFiles('src/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-prod-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: azfun-das2b-chris
          package: ./src
          remote-build: true

      - name: Wait for Function App startup
        run: sleep 15

      - name: Run health checks
        run: |
          python -c "
          import requests
          import time

          app_url = 'https://azfun-das2b-chris.azurewebsites.net'
          max_retries = 3
          retry_delay = 5

          for attempt in range(max_retries):
              try:
                  response = requests.get(app_url, timeout=10)
                  print(f'Health check passed: {response.status_code}')
                  break
              except Exception as e:
                  print(f'Health check attempt {attempt + 1}/{max_retries} failed: {e}')
                  if attempt < max_retries - 1:
                      time.sleep(retry_delay)
                  else:
                      raise
          "

      - name: Log deployment details
        run: |
          echo "Production deployment complete"
          echo "Version: ${{ github.event.release.tag_name }}"
          echo "Timestamp: $(date)"
          echo "Commit: ${{ github.sha }}"
